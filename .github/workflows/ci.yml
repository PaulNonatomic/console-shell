name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 20+ — jsdom@29 dropped Node 18 (its deep dep
        # @exodus/bytes is ESM-only and CJS-required from
        # html-encoding-sniffer there). The library itself
        # ships ESM + CJS and works on Node 18 at runtime;
        # this floor is purely a dev-deps constraint.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
