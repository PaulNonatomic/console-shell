<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>console-quest · foundry example</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				min-height: 100vh;
				font-family: ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace;
				background: #0a0a0f;
				color: #eef0f5;
				display: grid;
				place-items: center;
			}
			main {
				padding: 32px;
				text-align: center;
				max-width: 640px;
			}
			h1 {
				color: #c7f441;
				font-size: 28px;
				margin: 0 0 12px;
			}
			p {
				color: #909090;
				line-height: 1.6;
				font-size: 14px;
			}
			code {
				color: #f5a623;
				background: rgba(245, 166, 35, 0.08);
				padding: 2px 6px;
				border-radius: 3px;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>THE FOUNDRY</h1>
			<p>
				Open your browser dev tools and try
				<code>foundry.play()</code>. Pick options with
				<code>foundry.choose(n)</code>.
			</p>
		</main>
		<script type="module">
			import { createShell, createAdventure } from '../../src/index.ts';
			import { foundryScript } from './scenes.ts';

			const shell = createShell({
				namespace: 'foundry',
				banner: {
					art: `
████████████████████████████████████████
████████████████████████████████████████
████████████▓▓▓▓▓▓██████▓▓▓▓▓███████████
████████████       ▓███     ▓███████████
████████████        ███     ▓███████████
████████████         ██     ████████████
███████████▓         █▓     ████████████
███████████     ▓█         ▓████████████
███████████     ▓█▓        █████████████
███████████     ████       █████████████
██████████▓    ▓████▓     ▓█████████████
████████████████████████████████████████
████████████████████████████████████████
▓█▓▓█▓█▓████████▓▓██▓▓██▓██▓███▓███▓████
      ████████
      ██████
     ▓████▓
     ████
    ███`,
					wordmark: 'N O N A T O M I C',
					tagline: 'Analogue energy, shipped digitally.',
					hint: 'try foundry.play()'
				},
				commands: {
					about: {
						description: 'who we are',
						color: 'primary',
						run: () => console.log('%c   Built with console-quest.', 'color: #C7F441')
					}
				}
			});

			shell.attach(createAdventure(foundryScript));
			shell.install();
		</script>
	</body>
</html>
